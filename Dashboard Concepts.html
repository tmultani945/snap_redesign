<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Qube — Dashboard Design Explorations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B0E13; --surface: #11151C; --surface-2: #161B24;
    --border: #1F2632; --border-2: #2A3242;
    --fg: #E6E9EF; --fg-2: #98A2B3; --fg-3: #667085;
    --accent: #3F8CFF; --green: #22C55E; --amber: #F59E0B; --red: #EF4444; --violet: #A78BFA;
    --mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
    --serif: "Instrument Serif", Georgia, serif;
  }
  body { margin: 0; font-family: "Inter", system-ui, sans-serif; background: #050709; color: var(--fg); }
  /* Shared artboard chrome */
  .ab { width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; overflow: hidden; }
  .ab-top { height: 48px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 12px; flex-shrink: 0; }
  .brand { display: flex; align-items: center; gap: 8px; font-weight: 700; letter-spacing: -0.01em; }
  .brand-logo { width: 22px; height: 22px; border-radius: 6px; background: linear-gradient(135deg, var(--accent), var(--violet)); }
  .crumb { color: var(--fg-3); font-size: 13px; }
  .pill { padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
  .body { flex: 1; padding: 32px 40px; overflow: hidden; }
  .mono { font-family: var(--mono); }
  .btn { padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border-2); background: var(--surface); color: var(--fg); font-size: 13px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
  .btn-pri { background: var(--accent); border-color: var(--accent); color: white; }
  .btn-pri:hover { filter: brightness(1.1); }

  /* ============= IDEA A — Editorial / Magazine ============= */
  .a-body { padding: 0; height: 100%; display: grid; grid-template-columns: 1.05fr 0.95fr; }
  .a-left { padding: 56px 56px 40px; display: flex; flex-direction: column; justify-content: space-between; }
  .a-eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 24px; }
  .a-h1 { font-family: var(--serif); font-size: 92px; line-height: 0.92; letter-spacing: -0.03em; font-weight: 400; margin: 0 0 28px; }
  .a-h1 em { font-style: italic; color: var(--accent); }
  .a-lede { font-size: 17px; line-height: 1.5; color: var(--fg-2); max-width: 460px; margin: 0 0 32px; }
  .a-cta { display: flex; gap: 12px; }
  .a-foot { display: flex; gap: 28px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
  .a-stat { }
  .a-stat-n { font-family: var(--serif); font-size: 36px; line-height: 1; }
  .a-stat-l { font-size: 11px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 6px; font-family: var(--mono); }
  .a-right { background: linear-gradient(180deg, #0F1521 0%, #0A0D14 100%); position: relative; overflow: hidden; padding: 48px; display: flex; flex-direction: column; gap: 12px; justify-content: center; }
  .a-right::before { content: ""; position: absolute; inset: 0; background:
    radial-gradient(600px 300px at 80% 20%, rgba(63,140,255,0.18), transparent 60%),
    radial-gradient(500px 250px at 20% 80%, rgba(167,139,250,0.14), transparent 60%); }
  .a-card { position: relative; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
  .a-card-h { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .a-name { font-weight: 600; font-size: 14px; }
  .a-state { font-family: var(--mono); font-size: 11px; color: var(--accent); display: flex; align-items: center; gap: 6px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 1.5s infinite; }
  .dot-g { background: var(--green); }
  .dot-v { background: var(--violet); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .a-meta { font-size: 12px; color: var(--fg-3); display: flex; gap: 14px; }
  .a-progress { height: 4px; background: var(--surface-2); border-radius: 2px; margin-top: 12px; overflow: hidden; }
  .a-progress span { display: block; height: 100%; background: var(--accent); width: 30%; }
  .a-card.ext-a { width: 280px; align-self: flex-end; }
  .a-card.ext-b { width: 320px; }
  .a-card.ext-c { width: 260px; align-self: flex-end; opacity: 0.7; }

  /* ============= IDEA B — Command-K Console ============= */
  .b-body { padding: 0; display: flex; flex-direction: column; height: 100%; }
  .b-hero { padding: 64px 60px 32px; text-align: center; }
  .b-eye { display: inline-flex; align-items: center; gap: 8px; padding: 5px 12px; border-radius: 999px; background: rgba(63,140,255,0.12); color: var(--accent); font-size: 12px; font-weight: 600; margin-bottom: 22px; }
  .b-h1 { font-size: 44px; font-weight: 700; letter-spacing: -0.025em; margin: 0 0 16px; line-height: 1.1; }
  .b-lede { color: var(--fg-2); font-size: 16px; max-width: 580px; margin: 0 auto 28px; line-height: 1.55; }
  .b-cmdk { max-width: 640px; margin: 0 auto; background: var(--surface); border: 1px solid var(--border-2); border-radius: 14px; box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 4px rgba(63,140,255,0.08); overflow: hidden; }
  .b-cmd-input { padding: 16px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); font-size: 15px; }
  .b-prompt { color: var(--accent); font-family: var(--mono); }
  .b-input-text { color: var(--fg); }
  .b-cursor { width: 2px; height: 18px; background: var(--accent); animation: blink 1s infinite; display: inline-block; }
  @keyframes blink { 50% { opacity: 0; } }
  .b-kbd { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--fg-3); padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border); }
  .b-results { padding: 8px; }
  .b-group { padding: 8px 12px 4px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; color: var(--fg-3); text-transform: uppercase; }
  .b-item { padding: 10px 12px; border-radius: 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
  .b-item.sel { background: rgba(63,140,255,0.1); }
  .b-item-icon { width: 28px; height: 28px; border-radius: 6px; background: var(--surface-2); display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 11px; color: var(--accent); }
  .b-item-name { font-size: 14px; font-weight: 500; }
  .b-item-sub { font-size: 12px; color: var(--fg-3); margin-top: 2px; }
  .b-item-tag { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--fg-3); padding: 2px 8px; border: 1px solid var(--border); border-radius: 4px; }
  .b-tip { margin-top: 28px; text-align: center; color: var(--fg-3); font-size: 12px; }
  .b-tip kbd { font-family: var(--mono); padding: 2px 6px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; font-size: 11px; }

  /* ============= IDEA C — Story / Onboarding-first ============= */
  .c-body { padding: 0; display: grid; grid-template-rows: auto 1fr; height: 100%; }
  .c-hero { padding: 40px 48px 24px; }
  .c-h1 { font-size: 30px; font-weight: 600; letter-spacing: -0.015em; margin: 0 0 8px; }
  .c-h1 span { color: var(--accent); }
  .c-sub { color: var(--fg-2); font-size: 15px; }
  .c-stage { padding: 0 48px 48px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .c-step { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; position: relative; overflow: hidden; }
  .c-step.active { border-color: var(--accent); background: linear-gradient(180deg, rgba(63,140,255,0.08), var(--surface)); }
  .c-num { font-family: var(--mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0.1em; }
  .c-step.active .c-num { color: var(--accent); }
  .c-step-title { font-size: 17px; font-weight: 600; margin: 14px 0 8px; }
  .c-step-text { font-size: 13px; color: var(--fg-2); line-height: 1.5; margin-bottom: 16px; }
  .c-visual { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; min-height: 110px; }
  .c-mini-card { background: var(--surface-2); border-radius: 6px; padding: 8px 10px; font-size: 11px; display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .c-mini-card:last-child { margin-bottom: 0; }
  .c-mini-icon { width: 18px; height: 18px; border-radius: 4px; background: var(--accent); flex-shrink: 0; opacity: 0.5; }
  .c-tl { display: flex; align-items: center; justify-content: space-between; padding-top: 4px; }
  .c-node { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border-2); }
  .c-node.done { background: var(--green); border-color: var(--green); }
  .c-node.now { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 4px rgba(63,140,255,0.25); }
  .c-line { flex: 1; height: 2px; background: var(--border-2); margin: 0 4px; }
  .c-line.done { background: var(--green); }
  .c-files { display: flex; gap: 6px; flex-wrap: wrap; }
  .c-tag { font-family: var(--mono); font-size: 10px; padding: 3px 8px; background: var(--surface-2); border-radius: 4px; color: var(--fg-2); }

  /* ============= IDEA D — Live System Status (Operator) ============= */
  .d-body { padding: 0; display: grid; grid-template-columns: 320px 1fr; height: 100%; }
  .d-side { background: var(--surface); border-right: 1px solid var(--border); padding: 28px 24px; display: flex; flex-direction: column; gap: 24px; }
  .d-brand-block { padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  .d-brand-name { font-family: var(--serif); font-size: 36px; line-height: 1; letter-spacing: -0.02em; margin-bottom: 6px; }
  .d-brand-tag { font-size: 12px; color: var(--fg-3); }
  .d-section-h { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--fg-3); margin-bottom: 12px; }
  .d-stat-row { display: flex; justify-content: space-between; align-items: baseline; padding: 8px 0; border-bottom: 1px dashed var(--border); }
  .d-stat-row:last-child { border-bottom: none; }
  .d-stat-l { font-size: 13px; color: var(--fg-2); }
  .d-stat-v { font-family: var(--mono); font-size: 13px; font-weight: 600; }
  .d-stat-v.up { color: var(--green); }
  .d-stat-v.dn { color: var(--red); }
  .d-cta-block { margin-top: auto; padding: 18px; background: rgba(63,140,255,0.06); border: 1px solid rgba(63,140,255,0.2); border-radius: 10px; }
  .d-cta-block h4 { margin: 0 0 4px; font-size: 14px; }
  .d-cta-block p { margin: 0 0 12px; font-size: 12px; color: var(--fg-2); line-height: 1.5; }

  .d-main { padding: 32px 36px; overflow: hidden; display: flex; flex-direction: column; gap: 20px; }
  .d-page-h { display: flex; justify-content: space-between; align-items: flex-start; }
  .d-h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.015em; margin: 4px 0 6px; }
  .d-time { font-family: var(--mono); font-size: 12px; color: var(--fg-3); display: flex; align-items: center; gap: 8px; }
  .d-time .dot { width: 8px; height: 8px; }
  .d-board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .d-tile { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .d-tile-l { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-3); }
  .d-tile-n { font-family: var(--mono); font-size: 28px; font-weight: 500; margin: 8px 0 4px; }
  .d-tile-d { font-size: 11px; color: var(--fg-3); display: flex; align-items: center; gap: 4px; }
  .spark { height: 30px; width: 100%; margin-top: 10px; }

  .d-active { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .d-active-h { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .d-active-t { font-size: 14px; font-weight: 600; }
  .d-row { padding: 14px 18px; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 110px 1fr 100px 100px 80px; gap: 16px; align-items: center; font-size: 13px; }
  .d-row:last-child { border-bottom: none; }
  .d-rname { font-weight: 500; }
  .d-rtype { font-family: var(--mono); font-size: 11px; color: var(--fg-3); }
  .d-iter-bar { height: 6px; background: var(--surface-2); border-radius: 3px; overflow: hidden; }
  .d-iter-bar span { display: block; height: 100%; background: var(--accent); }
  .d-status-pg { color: var(--accent); font-size: 11px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
  .d-status-fn { color: var(--violet); font-size: 11px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }

  /* artboard label inside frames is suppressed by canvas — this is a self-contained */
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

/* ---- IDEA A — Editorial / Magazine ---- */
