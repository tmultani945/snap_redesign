<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Redesigned Run Report — SNAP Remote</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<link rel="stylesheet" href="base.css">
<link rel="stylesheet" href="report-styles.css">
<link rel="stylesheet" href="session-styles.css">

<style>
  /* Override map tile filter for dark theme */
  [data-theme="dark"] .rep-map .leaflet-tile { filter: brightness(0.85) invert(1) contrast(1.05) hue-rotate(180deg) saturate(0.65); }
  .leaflet-tooltip.rep-tt {
    background: var(--bg-surface); color: var(--fg-primary);
    border: 1px solid var(--border); border-radius: 8px;
    box-shadow: var(--shadow-md);
    font-family: var(--font-mono); font-size: 11px;
    padding: 6px 9px;
  }
  body { background: var(--bg-app); }
  /* Strong status chip colors map */
  .chip { --chip-status-pass: #22C55E; --chip-status-fail: #EF4444; }
</style>
</head>
<body data-theme="light">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="helpers.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="charts.jsx"></script>
  <script type="text/babel" src="map.jsx"></script>
  <script type="text/babel" src="session.jsx"></script>
  <script type="text/babel" src="report.jsx"></script>

  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<RunReport />);
  </script>
</body>
</html>
